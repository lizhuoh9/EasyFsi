name: ANSYS vertical flap validation contracts

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - solver/**
      - codex/**
  pull_request:
    branches:
      - main

jobs:
  contracts:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install minimal runtime dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy taichi pillow trimesh

      - name: Compile ANSYS validation modules
        shell: pwsh
        run: |
          python -m py_compile `
            simulation_core\generic_fsi_solver.py `
            simulation_core\pressure_sample_pairs.py `
            cases\ansys_vertical_flap_fsi.py `
            benchmarks\official\solid_mpm_fsi_runner.py `
            tools\validation\print_ansys_vertical_flap_diagnostics.py `
            tools\validation\ansys_vertical_flap_temporal_gates.py `
            validation_runs\ansys_vertical_flap_fsi\scripts\run_source_outlet_balance_matrix.py `
            validation_runs\ansys_vertical_flap_fsi\scripts\run_source_candidate_step20_matrix.py `
            validation_runs\ansys_vertical_flap_fsi\scripts\run_fixed_solid_source_temporal_matrix.py `
            validation_runs\ansys_vertical_flap_fsi\scripts\run_fixed_solid_load_temporal_matrix.py `
            validation_runs\ansys_vertical_flap_fsi\scripts\run_traction_formulation_validation_matrix.py `
            validation_runs\ansys_vertical_flap_fsi\scripts\run_traction_probe_observability_matrix.py `
            validation_runs\ansys_vertical_flap_fsi\scripts\run_traction_shared_snapshot.py `
            validation_runs\ansys_vertical_flap_fsi\scripts\run_traction_snapshot_resampling_matrix.py `
            validation_runs\ansys_vertical_flap_fsi\scripts\run_traction_probe_offset_decoupling_matrix.py `
            validation_runs\ansys_vertical_flap_fsi\scripts\run_traction_probe_ladder_stability_matrix.py `
            validation_runs\ansys_vertical_flap_fsi\scripts\run_traction_probe_ladder_control_matrix.py `
            validation_runs\ansys_vertical_flap_fsi\scripts\run_traction_symmetric_pressure_pair_matrix.py `
            validation_runs\ansys_vertical_flap_fsi\scripts\run_traction_pressure_pair_anchor_map_matrix.py `
            validation_runs\ansys_vertical_flap_fsi\scripts\run_traction_pressure_pair_reference_preselection_matrix.py `
            validation_runs\ansys_vertical_flap_fsi\scripts\run_traction_per_face_one_sided_matrix.py `
            validation_runs\ansys_vertical_flap_fsi\scripts\run_traction_reference_formulation_selection_matrix.py `
            validation_runs\ansys_vertical_flap_fsi\scripts\run_traction_fixed_solid_selected_formulation_matrix.py `
            validation_runs\ansys_vertical_flap_fsi\scripts\run_traction_selected_formulation_coupled_smoke.py `
            validation_runs\ansys_vertical_flap_fsi\scripts\run_traction_selected_formulation_coupled_step50.py `
            validation_runs\ansys_vertical_flap_fsi\scripts\run_ansys_vertical_flap_generic_solver.py `
            validation_runs\ansys_vertical_flap_fsi\scripts\build_synthetic_fluent_reference_fixture.py `
            validation_runs\ansys_vertical_flap_fsi\scripts\check_fluent_artifact_policy.py `
            validation_runs\ansys_vertical_flap_fsi\scripts\fluent_reference_contract_schema.py `
            validation_runs\ansys_vertical_flap_fsi\scripts\fluent_source_export_schema.py `
            validation_runs\ansys_vertical_flap_fsi\scripts\run_fluent_reference_collection_validation.py `
            validation_runs\ansys_vertical_flap_fsi\scripts\run_traction_selected_formulation_fluent_parity.py `
            validation_runs\ansys_vertical_flap_fsi\scripts\run_preflow_release_step20_matrix.py `
            scripts\check_validation_artifact_hygiene.py

          python -m py_compile `
            tests\contracts\test_generic_fsi_solver_architecture.py `
            tests\integration\test_ansys_vertical_flap_generic_solver_artifacts.py `
            tests\integration\test_ansys_vertical_flap_branch_review_docs.py `
            tests\integration\test_ansys_vertical_flap_fluent_artifact_policy.py `
            tests\integration\test_ansys_vertical_flap_policy_reports.py `
            tests\integration\test_refactoring_docs_are_nonempty.py `
            tests\integration\test_ansys_vertical_flap_real_fluent_import_gate_doc.py `
            tests\integration\test_ansys_vertical_flap_fluent_reference_export_protocol.py `
            tests\integration\test_ansys_vertical_flap_fluent_reference_synthetic_pipeline.py `
            tests\integration\test_ansys_vertical_flap_fluent_source_export_schema.py `
            tests\integration\test_ansys_vertical_flap_traction_selected_formulation_fluent_parity_comparison_logic.py `
            tests\tools\test_validation_artifact_hygiene.py `
            tests\tools\test_ansys_vertical_flap_validation_package.py `
            tests\solvers\test_pressure_sample_pair_provider_contract.py

      - name: Run runtime pressure-pair and generic architecture contracts
        shell: pwsh
        run: |
          python -m unittest -v `
            tests.solvers.test_pressure_sample_pair_provider_contract `
            tests.contracts.test_generic_fsi_solver_architecture `
            tests.cases.test_ansys_vertical_flap_fsi.AnsysVerticalFlapFsiSmokeTests.test_generic_problem_defaults_to_runtime_pressure_pairs_without_json `
            tests.cases.test_ansys_vertical_flap_fsi.AnsysVerticalFlapFsiSmokeTests.test_generic_replay_pressure_pairs_require_anchor_json `
            tests.cases.test_ansys_vertical_flap_fsi.AnsysVerticalFlapFsiSmokeTests.test_generic_pressure_pair_provider_mode_is_fail_closed `
            tests.cases.test_ansys_vertical_flap_fsi.AnsysVerticalFlapFsiSmokeTests.test_runtime_pressure_pair_mode_ignores_supplied_anchor_json_source `
            tests.cases.test_ansys_vertical_flap_fsi.AnsysVerticalFlapFsiSmokeTests.test_generic_problem_reports_runtime_half_domain_metadata `
            tests.integration.test_ansys_vertical_flap_generic_solver_artifacts `
            tests.integration.test_ansys_vertical_flap_traction_selected_formulation_fluent_parity_comparison_logic

      - name: Run archive artifact test - official half-domain
        shell: pwsh
        run: |
          python -m unittest `
            tests.integration.test_ansys_official_half_domain_archive_consistency `
            -v

      - name: Run archive artifact test - postrepair
        shell: pwsh
        run: |
          python -m unittest `
            tests.integration.test_ansys_vertical_flap_postrepair_artifacts `
            -v

      - name: Run archive artifact test - flow collapse
        shell: pwsh
        run: |
          python -m unittest `
            tests.integration.test_ansys_vertical_flap_flow_collapse_artifacts `
            -v

      - name: Run archive artifact test - sustained flow driver
        shell: pwsh
        run: |
          python -m unittest `
            tests.integration.test_ansys_vertical_flap_sustained_flow_driver_artifacts `
            -v

      - name: Run archive artifact test - source outlet balance
        shell: pwsh
        run: |
          python -m unittest `
            tests.integration.test_ansys_vertical_flap_source_outlet_balance_artifacts `
            -v

      - name: Run archive artifact test - source candidate step20
        shell: pwsh
        run: |
          python -m unittest `
            tests.integration.test_ansys_vertical_flap_source_candidate_step20_artifacts `
            -v

      - name: Run archive artifact test - source temporal gate
        shell: pwsh
        run: |
          python -m unittest `
            tests.integration.test_ansys_vertical_flap_source_candidate_temporal_gate_artifacts `
            -v

      - name: Run archive artifact test - fixed solid source temporal
        shell: pwsh
        run: |
          python -m unittest `
            tests.integration.test_ansys_vertical_flap_fixed_solid_source_temporal_artifacts `
            -v

      - name: Run archive artifact test - fixed solid load
        shell: pwsh
        run: |
          python -m unittest `
            tests.integration.test_ansys_vertical_flap_fixed_solid_load_artifacts `
            -v

      - name: Run traction artifact test - formulation
        shell: pwsh
        run: |
          python -m unittest `
            tests.integration.test_ansys_vertical_flap_traction_formulation_artifacts `
            -v

      - name: Run traction artifact test - probe observability
        shell: pwsh
        run: |
          python -m unittest `
            tests.integration.test_ansys_vertical_flap_traction_probe_observability_artifacts `
            -v

      - name: Run traction artifact test - shared snapshot
        shell: pwsh
        run: |
          python -m unittest `
            tests.integration.test_ansys_vertical_flap_traction_shared_snapshot_artifacts `
            -v

      - name: Run traction artifact test - snapshot resampling
        shell: pwsh
        run: |
          python -m unittest `
            tests.integration.test_ansys_vertical_flap_traction_snapshot_resampling_artifacts `
            -v

      - name: Run traction artifact test - probe offset decoupling
        shell: pwsh
        run: |
          python -m unittest `
            tests.integration.test_ansys_vertical_flap_traction_probe_offset_decoupling_artifacts `
            -v

      - name: Run traction artifact test - probe ladder stability
        shell: pwsh
        run: |
          python -m unittest `
            tests.integration.test_ansys_vertical_flap_traction_probe_ladder_stability_artifacts `
            -v

      - name: Run traction artifact test - probe ladder control
        shell: pwsh
        run: |
          python -m unittest `
            tests.integration.test_ansys_vertical_flap_traction_probe_ladder_control_artifacts `
            -v

      - name: Run traction artifact test - symmetric pressure pair
        shell: pwsh
        run: |
          python -m unittest `
            tests.integration.test_ansys_vertical_flap_traction_symmetric_pressure_pair_artifacts `
            -v

      - name: Run traction artifact test - pressure pair anchor map
        shell: pwsh
        run: |
          python -m unittest `
            tests.integration.test_ansys_vertical_flap_traction_pressure_pair_anchor_map_artifacts `
            -v

      - name: Run traction artifact test - pressure pair reference preselection
        shell: pwsh
        run: |
          python -m unittest `
            tests.integration.test_ansys_vertical_flap_traction_pressure_pair_reference_preselection_artifacts `
            -v

      - name: Run traction artifact test - per-face one-sided
        shell: pwsh
        run: |
          python -m unittest `
            tests.integration.test_ansys_vertical_flap_traction_per_face_one_sided_artifacts `
            -v

      - name: Run traction artifact test - reference formulation selection
        shell: pwsh
        run: |
          python -m unittest `
            tests.integration.test_ansys_vertical_flap_traction_reference_formulation_selection_artifacts `
            -v

      - name: Run traction artifact test - fixed solid selected formulation
        shell: pwsh
        run: |
          python -m unittest `
            tests.integration.test_ansys_vertical_flap_traction_fixed_solid_selected_formulation_artifacts `
            -v

      - name: Run traction artifact test - selected formulation coupled smoke
        shell: pwsh
        run: |
          python -m unittest `
            tests.integration.test_ansys_vertical_flap_traction_selected_formulation_coupled_smoke_artifacts `
            -v

      - name: Run traction artifact test - selected formulation coupled step50
        shell: pwsh
        run: |
          python -m unittest `
            tests.integration.test_ansys_vertical_flap_traction_selected_formulation_coupled_step50_artifacts `
            -v

      - name: Run generic solver artifact test - selected formulation
        shell: pwsh
        run: |
          python -m unittest `
            tests.integration.test_ansys_vertical_flap_generic_solver_artifacts `
            -v

      - name: Scan generic solver artifacts for forbidden transition states
        shell: pwsh
        run: |
          $root = "validation_runs\ansys_vertical_flap_fsi\generic_solver_selected_formulation_diagnostics"
          $patterns = @(
            "transition_seeded_from_anchor_artifact",
            "runtime_pressure_pair_generation_pending"
          )
          $hits = Get-ChildItem -Path $root -File -Recurse | Select-String -Pattern $patterns -SimpleMatch
          if ($hits) {
            $hits | ForEach-Object {
              Write-Error "$($_.Path):$($_.LineNumber): $($_.Line)"
            }
            exit 1
          }

      - name: Run Fluent reference collection artifact test
        shell: pwsh
        run: |
          python -m unittest `
            tests.integration.test_ansys_vertical_flap_fluent_reference_collection_artifacts `
            -v

      - name: Run Fluent reference contract schema test
        shell: pwsh
        run: |
          python -m unittest `
            tests.integration.test_ansys_vertical_flap_fluent_reference_contract_schema `
            -v

      - name: Run Fluent source export schema test
        shell: pwsh
        run: |
          python -m unittest `
            tests.integration.test_ansys_vertical_flap_fluent_source_export_schema `
            -v

      - name: Run Fluent reference export protocol test
        shell: pwsh
        run: |
          python -m unittest `
            tests.integration.test_ansys_vertical_flap_fluent_reference_export_protocol `
            -v

      - name: Run Fluent branch review docs test
        shell: pwsh
        run: |
          python -m unittest `
            tests.integration.test_ansys_vertical_flap_branch_review_docs `
            -v

      - name: Run refactoring docs non-empty test
        shell: pwsh
        run: |
          python -m unittest `
            tests.integration.test_refactoring_docs_are_nonempty `
            -v

      - name: Run real Fluent import gate doc test
        shell: pwsh
        run: |
          python -m unittest `
            tests.integration.test_ansys_vertical_flap_real_fluent_import_gate_doc `
            -v

      - name: Run Fluent synthetic reference pipeline test
        shell: pwsh
        run: |
          python -m unittest `
            tests.integration.test_ansys_vertical_flap_fluent_reference_synthetic_pipeline `
            -v

      - name: Run Fluent artifact policy test
        shell: pwsh
        run: |
          python -m unittest `
            tests.integration.test_ansys_vertical_flap_fluent_artifact_policy `
            -v

      - name: Run traction artifact test - selected formulation Fluent parity
        shell: pwsh
        run: |
          python -m unittest `
            tests.integration.test_ansys_vertical_flap_traction_selected_formulation_fluent_parity_artifacts `
            -v

      - name: Run Fluent parity comparison logic test
        shell: pwsh
        run: |
          python -m unittest `
            tests.integration.test_ansys_vertical_flap_traction_selected_formulation_fluent_parity_comparison_logic `
            -v

      - name: Scan Fluent artifacts for forbidden parity overclaims
        shell: pwsh
        run: |
          $roots = @(
            "validation_runs\ansys_vertical_flap_fsi\fluent_reference\validation_diagnostics",
            "validation_runs\ansys_vertical_flap_fsi\traction_selected_formulation_fluent_parity_diagnostics"
          )
          $patterns = @(
            "fluent_parity_validated",
            "Fluent parity validated"
          )
          $hits = Get-ChildItem -Path $roots -File -Recurse | Select-String -Pattern $patterns -SimpleMatch
          if ($hits) {
            $hits | ForEach-Object {
              Write-Error "$($_.Path):$($_.LineNumber): $($_.Line)"
            }
            exit 1
          }

      - name: Run JSON-aware Fluent artifact policy checker
        shell: pwsh
        run: |
          python validation_runs\ansys_vertical_flap_fsi\scripts\check_fluent_artifact_policy.py --write-report validation_runs\ansys_vertical_flap_fsi\policy_reports\fluent_artifact_policy_report.json

      - name: Run validation artifact hygiene test
        shell: pwsh
        run: |
          python -m unittest `
            tests.tools.test_validation_artifact_hygiene `
            -v

      - name: Run ANSYS vertical-flap validation package migration test
        shell: pwsh
        run: |
          python -m unittest `
            tests.tools.test_ansys_vertical_flap_validation_package `
            -v

      - name: Run validation artifact hygiene checker
        shell: pwsh
        run: |
          python scripts\check_validation_artifact_hygiene.py --write-report validation_runs\ansys_vertical_flap_fsi\policy_reports\validation_artifact_hygiene_report.json

      - name: Run Fluent policy report artifact test
        shell: pwsh
        run: |
          python -m unittest `
            tests.integration.test_ansys_vertical_flap_policy_reports `
            -v

      - name: Run archive artifact test - preflow release step20
        shell: pwsh
        run: |
          python -m unittest `
            tests.integration.test_ansys_vertical_flap_preflow_release_step20_artifacts `
            -v

      - name: Run source-level runner contracts
        shell: pwsh
        run: |
          python -m unittest -v `
            tests.cases.test_ansys_vertical_flap_fsi.AnsysVerticalFlapFsiSmokeTests.test_case_metadata_matches_ansys_tutorial_boundaries_and_targets `
            tests.cases.test_ansys_vertical_flap_fsi.AnsysVerticalFlapFsiSmokeTests.test_formal_runner_uses_official_full_span_flap_box `
            tests.cases.test_ansys_vertical_flap_fsi.AnsysVerticalFlapFsiSmokeTests.test_formal_runner_places_both_streamwise_marker_faces `
            tests.cases.test_ansys_vertical_flap_fsi.AnsysVerticalFlapFsiSmokeTests.test_solid_substep_cfl_report_preserves_explicit_higher_count `
            tests.cases.test_ansys_vertical_flap_fsi.AnsysVerticalFlapFsiSmokeTests.test_preflow_controls_are_exposed_without_changing_default_smoke `
            tests.cases.test_ansys_vertical_flap_fsi.AnsysVerticalFlapFsiSmokeTests.test_fixed_solid_preflow_reports_diagnostics_without_mpm_advance `
            tests.cases.test_ansys_vertical_flap_fsi.AnsysVerticalFlapFsiSmokeTests.test_region_split_preserves_loaded_total_marker_force `
            tests.cases.test_ansys_vertical_flap_fsi.AnsysVerticalFlapFsiSmokeTests.test_traction_formulation_controls_are_explicit_and_report_unsupported `
            tests.cases.test_ansys_vertical_flap_fsi.AnsysVerticalFlapFsiSmokeTests.test_sustained_flow_driver_modes_are_explicit_and_default_safe `
            tests.cases.test_ansys_vertical_flap_fsi.AnsysVerticalFlapFsiSmokeTests.test_source_strength_factor_supports_constant_and_ramp_profiles `
            tests.cases.test_ansys_vertical_flap_fsi.AnsysVerticalFlapFsiSmokeTests.test_source_ramp_schedule_continues_from_preflow_by_default `
            tests.cases.test_ansys_vertical_flap_fsi.AnsysVerticalFlapFsiSmokeTests.test_source_ramp_schedule_uses_contiguous_preflow_indices `
            tests.integration.test_ansys_vertical_flap_runner_loop_contract

      - name: Run diagnostics unit tests
        shell: pwsh
        run: |
          python -m unittest `
            tests.tools.test_ansys_vertical_flap_diagnostics `
            tests.tools.test_ansys_vertical_flap_temporal_gate `
            -v

      - name: Run traction probe diagnostics unit tests when CUDA is enabled
        shell: pwsh
        run: |
          python -m unittest -v `
            tests.solvers.test_hibm_traction_probe_diagnostics.HibmMpmTractionProbeDiagnosticsTests.test_uniform_two_sided_pressure_reports_zero_jump_and_probe_evidence `
            tests.solvers.test_hibm_traction_probe_diagnostics.HibmMpmTractionProbeDiagnosticsTests.test_piecewise_two_sided_pressure_reports_jump_sign_and_nearest_cells `
            tests.solvers.test_hibm_traction_probe_diagnostics.HibmMpmTractionProbeDiagnosticsTests.test_missing_two_sided_probe_resets_sentinel_fields_and_reason_code `
            tests.solvers.test_hibm_traction_probe_diagnostics.HibmMpmTractionProbeDiagnosticsTests.test_pressure_only_and_general_paths_report_equivalent_pressure_traction `
            tests.solvers.test_hibm_traction_probe_diagnostics.HibmMpmTractionProbeDiagnosticsTests.test_base_viscous_split_preserves_pressure_viscous_total_decomposition `
            tests.solvers.test_hibm_traction_probe_diagnostics.HibmMpmTractionProbeDiagnosticsTests.test_external_total_traction_keeps_public_decomposition_consistent `
            tests.solvers.test_hibm_traction_probe_ladder_controls `
            tests.solvers.test_hibm_traction_symmetric_pressure_pair `
            tests.solvers.test_hibm_traction_pressure_pair_anchor_map `
            tests.solvers.test_hibm_traction_per_face_one_sided_pressure
