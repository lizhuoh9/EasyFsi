name: ANSYS vertical flap validation contracts

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - solver/**
      - codex/**
  pull_request:
    branches:
      - main

jobs:
  contracts:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install minimal runtime dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy taichi pillow

      - name: Compile ANSYS validation modules
        shell: pwsh
        run: |
          python -m py_compile `
            cases\ansys_vertical_flap_fsi.py `
            benchmarks\official\solid_mpm_fsi_runner.py `
            tools\validation\print_ansys_vertical_flap_diagnostics.py `
            tools\validation\ansys_vertical_flap_temporal_gates.py `
            validation_runs\ansys_vertical_flap_fsi\scripts\run_source_outlet_balance_matrix.py `
            validation_runs\ansys_vertical_flap_fsi\scripts\run_source_candidate_step20_matrix.py `
            validation_runs\ansys_vertical_flap_fsi\scripts\run_fixed_solid_source_temporal_matrix.py `
            validation_runs\ansys_vertical_flap_fsi\scripts\run_fixed_solid_load_temporal_matrix.py `
            validation_runs\ansys_vertical_flap_fsi\scripts\run_traction_formulation_validation_matrix.py `
            validation_runs\ansys_vertical_flap_fsi\scripts\run_traction_probe_observability_matrix.py `
            validation_runs\ansys_vertical_flap_fsi\scripts\run_traction_shared_snapshot.py `
            validation_runs\ansys_vertical_flap_fsi\scripts\run_traction_snapshot_resampling_matrix.py `
            validation_runs\ansys_vertical_flap_fsi\scripts\run_traction_probe_offset_decoupling_matrix.py `
            validation_runs\ansys_vertical_flap_fsi\scripts\run_traction_probe_ladder_stability_matrix.py `
            validation_runs\ansys_vertical_flap_fsi\scripts\run_traction_probe_ladder_control_matrix.py `
            validation_runs\ansys_vertical_flap_fsi\scripts\run_traction_symmetric_pressure_pair_matrix.py `
            validation_runs\ansys_vertical_flap_fsi\scripts\run_traction_pressure_pair_anchor_map_matrix.py `
            validation_runs\ansys_vertical_flap_fsi\scripts\run_traction_pressure_pair_reference_preselection_matrix.py `
            validation_runs\ansys_vertical_flap_fsi\scripts\run_traction_per_face_one_sided_matrix.py `
            validation_runs\ansys_vertical_flap_fsi\scripts\run_traction_reference_formulation_selection_matrix.py `
            validation_runs\ansys_vertical_flap_fsi\scripts\run_preflow_release_step20_matrix.py

      - name: Run archive artifact test - official half-domain
        shell: pwsh
        run: |
          python -m unittest `
            tests.integration.test_ansys_official_half_domain_archive_consistency `
            -v

      - name: Run archive artifact test - postrepair
        shell: pwsh
        run: |
          python -m unittest `
            tests.integration.test_ansys_vertical_flap_postrepair_artifacts `
            -v

      - name: Run archive artifact test - flow collapse
        shell: pwsh
        run: |
          python -m unittest `
            tests.integration.test_ansys_vertical_flap_flow_collapse_artifacts `
            -v

      - name: Run archive artifact test - sustained flow driver
        shell: pwsh
        run: |
          python -m unittest `
            tests.integration.test_ansys_vertical_flap_sustained_flow_driver_artifacts `
            -v

      - name: Run archive artifact test - source outlet balance
        shell: pwsh
        run: |
          python -m unittest `
            tests.integration.test_ansys_vertical_flap_source_outlet_balance_artifacts `
            -v

      - name: Run archive artifact test - source candidate step20
        shell: pwsh
        run: |
          python -m unittest `
            tests.integration.test_ansys_vertical_flap_source_candidate_step20_artifacts `
            -v

      - name: Run archive artifact test - source temporal gate
        shell: pwsh
        run: |
          python -m unittest `
            tests.integration.test_ansys_vertical_flap_source_candidate_temporal_gate_artifacts `
            -v

      - name: Run archive artifact test - fixed solid source temporal
        shell: pwsh
        run: |
          python -m unittest `
            tests.integration.test_ansys_vertical_flap_fixed_solid_source_temporal_artifacts `
            -v

      - name: Run archive artifact test - fixed solid load
        shell: pwsh
        run: |
          python -m unittest `
            tests.integration.test_ansys_vertical_flap_fixed_solid_load_artifacts `
            -v

      - name: Run traction artifact test - formulation
        shell: pwsh
        run: |
          python -m unittest `
            tests.integration.test_ansys_vertical_flap_traction_formulation_artifacts `
            -v

      - name: Run traction artifact test - probe observability
        shell: pwsh
        run: |
          python -m unittest `
            tests.integration.test_ansys_vertical_flap_traction_probe_observability_artifacts `
            -v

      - name: Run traction artifact test - shared snapshot
        shell: pwsh
        run: |
          python -m unittest `
            tests.integration.test_ansys_vertical_flap_traction_shared_snapshot_artifacts `
            -v

      - name: Run traction artifact test - snapshot resampling
        shell: pwsh
        run: |
          python -m unittest `
            tests.integration.test_ansys_vertical_flap_traction_snapshot_resampling_artifacts `
            -v

      - name: Run traction artifact test - probe offset decoupling
        shell: pwsh
        run: |
          python -m unittest `
            tests.integration.test_ansys_vertical_flap_traction_probe_offset_decoupling_artifacts `
            -v

      - name: Run traction artifact test - probe ladder stability
        shell: pwsh
        run: |
          python -m unittest `
            tests.integration.test_ansys_vertical_flap_traction_probe_ladder_stability_artifacts `
            -v

      - name: Run traction artifact test - probe ladder control
        shell: pwsh
        run: |
          python -m unittest `
            tests.integration.test_ansys_vertical_flap_traction_probe_ladder_control_artifacts `
            -v

      - name: Run traction artifact test - symmetric pressure pair
        shell: pwsh
        run: |
          python -m unittest `
            tests.integration.test_ansys_vertical_flap_traction_symmetric_pressure_pair_artifacts `
            -v

      - name: Run traction artifact test - pressure pair anchor map
        shell: pwsh
        run: |
          python -m unittest `
            tests.integration.test_ansys_vertical_flap_traction_pressure_pair_anchor_map_artifacts `
            -v

      - name: Run traction artifact test - pressure pair reference preselection
        shell: pwsh
        run: |
          python -m unittest `
            tests.integration.test_ansys_vertical_flap_traction_pressure_pair_reference_preselection_artifacts `
            -v

      - name: Run traction artifact test - per-face one-sided
        shell: pwsh
        run: |
          python -m unittest `
            tests.integration.test_ansys_vertical_flap_traction_per_face_one_sided_artifacts `
            -v

      - name: Run traction artifact test - reference formulation selection
        shell: pwsh
        run: |
          python -m unittest `
            tests.integration.test_ansys_vertical_flap_traction_reference_formulation_selection_artifacts `
            -v

      - name: Run archive artifact test - preflow release step20
        shell: pwsh
        run: |
          python -m unittest `
            tests.integration.test_ansys_vertical_flap_preflow_release_step20_artifacts `
            -v

      - name: Run source-level runner contracts
        shell: pwsh
        run: |
          python -m unittest -v `
            tests.cases.test_ansys_vertical_flap_fsi.AnsysVerticalFlapFsiSmokeTests.test_case_metadata_matches_ansys_tutorial_boundaries_and_targets `
            tests.cases.test_ansys_vertical_flap_fsi.AnsysVerticalFlapFsiSmokeTests.test_formal_runner_uses_official_full_span_flap_box `
            tests.cases.test_ansys_vertical_flap_fsi.AnsysVerticalFlapFsiSmokeTests.test_formal_runner_places_both_streamwise_marker_faces `
            tests.cases.test_ansys_vertical_flap_fsi.AnsysVerticalFlapFsiSmokeTests.test_solid_substep_cfl_report_preserves_explicit_higher_count `
            tests.cases.test_ansys_vertical_flap_fsi.AnsysVerticalFlapFsiSmokeTests.test_preflow_controls_are_exposed_without_changing_default_smoke `
            tests.cases.test_ansys_vertical_flap_fsi.AnsysVerticalFlapFsiSmokeTests.test_fixed_solid_preflow_reports_diagnostics_without_mpm_advance `
            tests.cases.test_ansys_vertical_flap_fsi.AnsysVerticalFlapFsiSmokeTests.test_region_split_preserves_loaded_total_marker_force `
            tests.cases.test_ansys_vertical_flap_fsi.AnsysVerticalFlapFsiSmokeTests.test_traction_formulation_controls_are_explicit_and_report_unsupported `
            tests.cases.test_ansys_vertical_flap_fsi.AnsysVerticalFlapFsiSmokeTests.test_sustained_flow_driver_modes_are_explicit_and_default_safe `
            tests.cases.test_ansys_vertical_flap_fsi.AnsysVerticalFlapFsiSmokeTests.test_source_strength_factor_supports_constant_and_ramp_profiles `
            tests.cases.test_ansys_vertical_flap_fsi.AnsysVerticalFlapFsiSmokeTests.test_source_ramp_schedule_continues_from_preflow_by_default `
            tests.cases.test_ansys_vertical_flap_fsi.AnsysVerticalFlapFsiSmokeTests.test_source_ramp_schedule_uses_contiguous_preflow_indices `
            tests.integration.test_ansys_vertical_flap_runner_loop_contract

      - name: Run diagnostics unit tests
        shell: pwsh
        run: |
          python -m unittest `
            tests.tools.test_ansys_vertical_flap_diagnostics `
            tests.tools.test_ansys_vertical_flap_temporal_gate `
            -v

      - name: Run traction probe diagnostics unit tests when CUDA is enabled
        shell: pwsh
        run: |
          python -m unittest -v `
            tests.solvers.test_hibm_traction_probe_diagnostics.HibmMpmTractionProbeDiagnosticsTests.test_uniform_two_sided_pressure_reports_zero_jump_and_probe_evidence `
            tests.solvers.test_hibm_traction_probe_diagnostics.HibmMpmTractionProbeDiagnosticsTests.test_piecewise_two_sided_pressure_reports_jump_sign_and_nearest_cells `
            tests.solvers.test_hibm_traction_probe_diagnostics.HibmMpmTractionProbeDiagnosticsTests.test_missing_two_sided_probe_resets_sentinel_fields_and_reason_code `
            tests.solvers.test_hibm_traction_probe_diagnostics.HibmMpmTractionProbeDiagnosticsTests.test_pressure_only_and_general_paths_report_equivalent_pressure_traction `
            tests.solvers.test_hibm_traction_probe_diagnostics.HibmMpmTractionProbeDiagnosticsTests.test_base_viscous_split_preserves_pressure_viscous_total_decomposition `
            tests.solvers.test_hibm_traction_probe_diagnostics.HibmMpmTractionProbeDiagnosticsTests.test_external_total_traction_keeps_public_decomposition_consistent `
            tests.solvers.test_hibm_traction_probe_ladder_controls `
            tests.solvers.test_hibm_traction_symmetric_pressure_pair `
            tests.solvers.test_hibm_traction_pressure_pair_anchor_map `
            tests.solvers.test_hibm_traction_per_face_one_sided_pressure
